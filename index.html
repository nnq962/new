    <meta name="description" content="Portfolio and shared study materials, useful software by Quyet Ngoc Nguyen." />

    <script>
      // Run this IMMEDIATELY to prevent theme flashing before React hydrates
      (function() {
        try {
          var theme = localStorage.getItem('ui-theme') || 'device';
          if (theme === 'dark' || (theme === 'device' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
